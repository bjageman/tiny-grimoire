name: Deploy to Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            export DOCKER_HOST=unix:///tank/services/docker.sock
            cd /home/neurobomber/Apps-Docker/vibes/botc-grimoire-companion
            git fetch origin
            # Move the local branch pointer to match origin without touching the
            # working tree, since the clone below only sees this dir's local
            # branches, not its origin/* tracking refs.
            git update-ref refs/heads/dev origin/dev

            # Build the new image in a clean temporary directory to prevent local changes from blocking checkout
            rm -rf /tmp/botc-grimoire-companion-dev-build
            git clone --no-checkout file:///home/neurobomber/Apps-Docker/vibes/botc-grimoire-companion /tmp/botc-grimoire-companion-dev-build
            cd /tmp/botc-grimoire-companion-dev-build
            git checkout origin/dev
            cp /home/neurobomber/Apps-Docker/vibes/botc-grimoire-companion/docker-compose.prod.yml .
            cp /home/neurobomber/Apps-Docker/vibes/botc-grimoire-companion/docker-compose.dev.yml .
            cp /home/neurobomber/Apps-Docker/vibes/botc-grimoire-companion/.env .
            BUILDKIT_PROGRESS=plain docker compose -f docker-compose.dev.yml build
            
            # Switch back to the main directory, clean up the build directory, and update the container
            cd /home/neurobomber/Apps-Docker/vibes/botc-grimoire-companion
            rm -rf /tmp/botc-grimoire-companion-dev-build
            docker compose -f docker-compose.dev.yml up -d --remove-orphans

